<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico - Formulafacil UTN</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #0f0;
        }
        .test {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #333;
            background: #000;
        }
        .ok { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #ff0; }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>🔬 DIAGNÓSTICO FORMULAFACIL UTN</h1>
    <p>Esta página detectará por qué el juego no funciona en ciertos dispositivos.</p>
    
    <div id="results"></div>
    
    <h2>Prueba de Event Listeners:</h2>
    <button id="testBtn" onclick="testOnclick()">Test Onclick</button>
    <button id="testBtn2">Test addEventListener</button>
    <div id="testResult"></div>

    <script>
        const results = document.getElementById('results');
        const testResult = document.getElementById('testResult');
        
        function log(msg, type = 'ok') {
            const div = document.createElement('div');
            div.className = 'test ' + type;
            div.textContent = msg;
            results.appendChild(div);
        }
        
        // TEST 1: ¿Se ejecuta JavaScript?
        log('✅ TEST 1: JavaScript funciona');
        
        // TEST 2: ¿Está DOMContentLoaded?
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            log('✅ TEST 2: DOM está listo');
        } else {
            log('❌ TEST 2: DOM NO está listo', 'error');
        }
        
        // TEST 3: ¿Puede cargar otros scripts?
        function checkScript(name) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = name;
                script.onload = () => resolve(true);
                script.onerror = () => resolve(false);
                document.head.appendChild(script);
            });
        }
        
        // TEST 4: Content Security Policy
        try {
            eval('1+1');
            log('✅ TEST 4: eval() permitido (CSP no estricto)', 'warning');
        } catch(e) {
            log('⚠️  TEST 4: eval() bloqueado (CSP estricto)', 'warning');
        }
        
        // TEST 5: Onclick inline
        function testOnclick() {
            testResult.innerHTML = '<span class="ok">✅ Onclick inline funciona</span>';
        }
        
        // TEST 6: addEventListener
        document.getElementById('testBtn2').addEventListener('click', function() {
            testResult.innerHTML = '<span class="ok">✅ addEventListener funciona</span>';
        });
        
        // TEST 7: ¿Puede acceder a archivos del sitio?
        fetch('app.js')
            .then(r => r.ok ? log('✅ TEST 7: Puede cargar app.js') : log('❌ TEST 7: NO puede cargar app.js', 'error'))
            .catch(() => log('❌ TEST 7: Error al cargar app.js', 'error'));
        
        fetch('data.js')
            .then(r => r.ok ? log('✅ TEST 8: Puede cargar data.js') : log('❌ TEST 8: NO puede cargar data.js', 'error'))
            .catch(() => log('❌ TEST 8: Error al cargar data.js', 'error'));
        
        // TEST 9: Información del navegador
        log(`📱 Navegador: ${navigator.userAgent}`);
        log(`📐 Pantalla: ${screen.width}x${screen.height}`);
        log(`💾 Memoria: ${navigator.deviceMemory || 'N/A'} GB`);
        log(`🌐 Online: ${navigator.onLine ? 'Sí' : 'No'}`);
        
        // TEST 10: ¿Puede crear elementos dinámicos?
        const testDiv = document.createElement('div');
        testDiv.innerHTML = '<button data-test="value">Test</button>';
        if (testDiv.querySelector('button').getAttribute('data-test') === 'value') {
            log('✅ TEST 10: data-attributes funcionan');
        } else {
            log('❌ TEST 10: data-attributes NO funcionan', 'error');
        }
        
        // TEST 11: Cargar todos los scripts del juego
        setTimeout(async () => {
            log('--- CARGANDO SCRIPTS DEL JUEGO ---');
            
            const scripts = [
                'data.js',
                'functions-data.js',
                'inequalities-data.js',
                'absolute-value-data.js',
                'intervals-data.js',
                'practice.js',
                'functions-practice-new.js',
                'inequalities-practice.js',
                'absolute-value-practice.js',
                'geometry-figures-svg.js',
                'generador_ejercicios.js',
                'audio.js',
                'themes.js',
                'app.js'
            ];
            
            for (const s of scripts) {
                const ok = await checkScript(s);
                if (ok) {
                    log(`✅ Cargado: ${s}`);
                } else {
                    log(`❌ ERROR al cargar: ${s}`, 'error');
                }
            }
            
            // Verificar si las funciones están disponibles
            setTimeout(() => {
                log('--- VERIFICANDO FUNCIONES ---');
                log(`geometryData: ${typeof window.geometryData}`);
                log(`functionsData: ${typeof window.functionsData}`);
                log(`generatePracticeExerciseGeometry: ${typeof window.generatePracticeExerciseGeometry}`);
                log(`generatePracticeExerciseFunctions: ${typeof window.generatePracticeExerciseFunctions}`);
                
                if (typeof window.geometryData !== 'undefined') {
                    log('✅ geometryData cargado correctamente');
                } else {
                    log('❌ geometryData NO cargado', 'error');
                }
            }, 2000);
        }, 1000);
    </script>
</body>
</html>
